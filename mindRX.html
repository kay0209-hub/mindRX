<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MZ 마음 처방전 💊</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0c20; /* 깊고 트렌디한 네이비 블랙 */
            color: #ffffff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent; 
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .header-zone {
            margin-bottom: 20px;
        }

        .title-text {
            font-size: 1rem;
            font-weight: 600;
            color: #a29bfe;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(162, 155, 254, 0.4);
        }

        .ask-text {
            font-size: 1.3rem;
            color: #ffeaa7;
            font-weight: bold;
        }

        .mood-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            margin-bottom: 25px;
        }

        .mood-btn {
            background: #1e1b4b;
            color: #fff;
            border: 1px solid #312e81;
            padding: 10px 0;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .mood-btn span {
            font-size: 1.3rem;
        }

        .mood-btn.active {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-color: #a29bfe;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(108, 92, 231, 0.4);
        }

        /* 📦 선물 상자 및 명언이 보일 외곽 터치 구역 */
        .touch-zone {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 35px 20px;
            border-radius: 24px;
            cursor: pointer;
            box-sizing: border-box;
            min-height: 200px; /* 선물상자와 명언 모두 안정적으로 배치될 높이 */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.02);
            position: relative;
        }

        /* 🎁 선물 상자 대기 상태 뷰 */
        .gift-box-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .gift-emoji {
            font-size: 3.5rem;
            animation: bounce 1.5s infinite ease-in-out; /* 통통 튀는 효과 */
        }

        .gift-text {
            font-size: 1rem;
            color: #b2bec3;
            font-weight: 500;
        }

        /* 명언 카드 (처음엔 숨김) */
        .card {
            width: 100%;
            display: none; 
        }

        .quote {
            font-size: 1.3rem;
            font-weight: bold;
            line-height: 1.6;
            margin-bottom: 15px;
            word-break: keep-all;
            color: #ffffff;
        }

        .author {
            font-size: 0.9rem;
            color: #00cec9;
            font-weight: 500;
        }

        .tip {
            font-size: 0.75rem;
            color: #444;
            margin-top: 20px;
            letter-spacing: 0.5px;
        }

        /* 선물상자 통통 튀는 애니메이션 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ✨ 상자가 열리며 명언이 슥- 나타나는 프리미엄 페이드인 */
        .fade-in {
            animation: premiumFadeIn 0.7s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes premiumFadeIn {
            from { 
                opacity: 0; 
                transform: scale(0.92) translateY(10px);
                filter: blur(4px);
            }
            to { 
                opacity: 1; 
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-zone">
            <div class="title-text">🔮 MIND RX 🔮</div>
            <div class="ask-text">당신의 오늘 기분은?</div>
        </div>
        
        <div class="mood-selector">
            <button class="mood-btn active" onclick="selectMood('우울', event)"><span>💧</span>우울</button>
            <button class="mood-btn" onclick="selectMood('짜증', event)"><span>🔥</span>짜증</button>
            <button class="mood-btn" onclick="selectMood('슬픔', event)"><span>😢</span>슬픔</button>
            <button class="mood-btn" onclick="selectMood('실연', event)"><span>💔</span>실연</button>
            <button class="mood-btn" onclick="selectMood('퇴사', event)"><span>💼</span>퇴사</button>
            <button class="mood-btn" onclick="selectMood('행복', event)"><span>🍀</span>행복</button>
            <button class="mood-btn" onclick="selectMood('연애', event)"><span>❤️</span>연애</button>
            <button class="mood-btn" onclick="selectMood('투자', event)"><span>📈</span>투자</button>
        </div>
        
        <!-- 터치 구역 -->
        <div class="touch-zone" onclick="openGift()">
            <!-- 1. 선물상자 대기 화면 -->
            <div id="gift-box" class="gift-box-view">
                <div class="gift-emoji">🎁</div>
                <div class="gift-text">상자를 터치해 처방전을 열어보세요!</div>
            </div>

            <!-- 2. 실제 명언 내용 화면 -->
            <div class="card" id="quote-box">
                <div class="quote" id="quote">"처방전 문구"</div>
                <div class="author" id="author">- 유명인사 -</div>
            </div>
        </div>
        
        <div class="tip" id="guide-tip">상자를 누르면 오늘의 명언 선물이 열립니다 🎁</div>
    </div>

    <script>
        const quoteDatabase = {
            "우울": [
                { text: "그냥 살다 보면 살아진다. 그러니까 너무 애쓰지 마라.", author: "이효리" },
                { text: "포기하면 편하다. 굳이 안 되는 걸 붙잡고 우울해하지 말자.", author: "박명수" },
                { text: "내가 생각하는 나와 사람들이 보는 나는 다를 수 있다. 나 자신을 너무 괴롭히지 마라.", author: "유재석" },
                { text: "지나간 일에 대해서는 절대 후회하지 않는다. 어차피 지나간 일이니까.", author: "한소희" },
                { text: "힘들 때 울지 마라. 울어봐야 달라지는 건 없다. 맛있는 거나 먹자.", author: "백종원" },
                { text: "때로는 아무것도 하지 않는 것이 영혼을 구하는 가장 적극적인 행동이다.", author: "스티브 잡스" },
                { text: "기분이 우울할 땐 고기 앞으로 가라. 탄수화물도 잊지 말고.", author: "전국고기협회" },
                { text: "우울한 생각이 들 때는 빨리 자라. 잠은 공짜 보약이다.", author: "프로꿀잠러" },
                { text: "행복해서 웃는 게 아니라, 맛있는 걸 먹어서 웃는 거다.", author: "먹스타그래머" },
                { text: "인생은 원래 혼자다. 굳이 무리해서 남한테 맞출 필요 없다.", author: "마이웨이 지침서" },
                { text: "지금 우울한 건 당신 탓이 아니라 날씨나 호르몬 탓이다. 자책 금지.", author: "방구석 의학박사" },
                { text: "힘내지 마세요. 힘 안 내도 세상 안 무너집니다.", author: "인생은 흘러가는 대로" },
                { text: "아무것도 안 하고 있지만 더 격렬하게 아무것도 안 하고 싶다.", author: "침대 위 철학가" },
                { text: "괜찮아, 어차피 지구는 멸망하지 않고 내일의 태양은 뜬다.", author: "초긍정 우주론자" },
                { text: "가끔은 멍 때리는 시간이 뇌를 구원한다.", author: "멍때리기 대회 우승자" },
                { text: "인생은 넷플릭스 같다. 볼 건 많은데 고르기 귀찮고 막상 보면 별거 없다.", author: "스트리밍 중독자" },
                { text: "남들은 다 잘 사는 것 같지만, 다들 각자의 지옥을 견디며 산다.", author: "현실 에세이" },
                { text: "비가 와야 무지개가 뜨는 법이다. 지금은 잠깐 비가 내리는 타이밍.", author: "희망 처방전" },
                { text: "오늘 하루만큼은 무거운 생각 내려놓고 나 자신에게 휴가를 주자.", author: "힐링 마스터" },
                { text: "네가 존재한다는 것 자체만으로도 누군가에게는 큰 위로가 된다.", author: "익명의 친구" }
            ],
            "짜증": [
                { text: "참을 인 세 번이면 살인을 면한다는 말 다 거짓말이다. 참을 인 세 번이면 호구 된다.", author: "박명수" },
                { text: "나를 싫어하는 사람들을 설득하느라 내 아까운 시간을 낭비할 필요는 없다.", author: "테일러 스위프트" },
                { text: "외부의 비판에 너무 흔들리지 마라. 그들은 내 인생을 대신 살아주지 않는다.", author: "윈터 (에스파)" },
                { text: "세상 모든 사람에게 사랑받을 준비를 하지 마라. 그건 불가능하다.", author: "아이유" },
                { text: "가는 말이 고우면 보는 눈이 높다. 현실은 호락호락하지 않다.", author: "명언 비틀기" },
                { text: "화가 날 때는 10까지 세어라. 죽고 싶을 만큼 화가 날 때는 100까지 세어라.", author: "마크 트웨인" },
                { text: "짜증 날 땐 굳이 참지 말고 금융 치료(쇼핑)를 받아라.", author: "소비요정" },
                { text: "세상에는 내가 바꿀 수 없는 빌런들이 너무 많다. 그냥 무시가 답.", author: "멘탈 관리자" },
                { text: "인간관계에 너무 연연하지 마라. 어차피 남을 사람은 남는다.", author: "인간관계 미니멀리스트" },
                { text: "아니면 말고 정신으로 살면 세상 편하다.", author: "쿨가이" },
                { text: "참고 참으면 윤리책에나 나오지, 현실에선 화병만 생긴다.", author: "사이다 직설" },
                { text: "나한테 무례한 사람에게까지 착할 필요는 전혀 없다.", author: "자존감 수호자" },
                { text: "내 기분은 내가 정해. 오늘 나는 '짜증'으로 시작해서 '평온'으로 끝낼 거야.", author: "이상한 나라의 앨리스" },
                { text: "화가 나면 소리를 지르는 대신 통장 잔고를 봐라. 더 화가 나서 슬픔으로 바뀐다.", author: "유머 처방전" },
                { text: "세상의 중심은 나다. 나를 언짢게 하는 것들은 전부 조연일 뿐이다.", author: "주인공 마인드" },
                { text: "남 눈치 보지 말고 네 스타일대로 밀고 나가라.", author: "제시" },
                { text: "말을 안 들으면 그냥 두세요. 고쳐 쓰려다 내 멘탈만 터집니다.", author: "인생 2회차" },
                { text: "비교는 불행의 지름길이다. 나는 나대로 잘 살고 있다.", author: "마이웨이 요정" },
                { text: "지나간 무례함은 잊어라. 쓰레기는 쓰레기통에, 생각은 안드로메다로.", author: "정신건강의학과" },
                { text: "오늘 나를 짜증 나게 한 사람, 내일 내 기억 속에서 영구 삭제.", author: "기억 저장소" }
            ],
            "슬픔": [
                { text: "눈물이 나면 그냥 울어라. 슬픔을 억누르는 것보다 쏟아내는 게 건강에 이롭다.", author: "오은영 박사" },
                { text: "오늘 흘린 눈물은 내일의 강력한 멘탈이 된다. 당신은 성장하는 중이다.", author: "손흥민" },
                { text: "인생은 가까이서 보면 비극이지만 멀리서 보면 희극이다.", author: "찰리 채플린" },
                { text: "괴로운 일은 언제나 한꺼번에 오지만, 결국엔 다 지나가게 마련이다.", author: "김연아" },
                { text: "시간이 약이라는 말은 진짜다. 지금은 아파도 무조건 희미해진다.", author: "시간 여행자" },
                { text: "완벽하지 않아도 괜찮다. 실수 좀 했다고 인생 안 끝난다.", author: "위로 마스터" },
                { text: "오늘 하루 안 풀렸다고 해서 내 인생 전체가 꼬인 건 아니다.", author: "팩트 체크" },
                { text: "누구나 마음속에 방 한 칸쯤은 슬픔을 두고 산다.", author: "새벽 감성글" },
                { text: "힘든 일은 한꺼번에 오지만, 좋은 일도 결국 몰려온다.", author: "인생 주기설" },
                { text: "너는 생각보다 훨씬 귀하고 잘하고 있다.", author: "당신의 익명 친구" },
                { text: "슬픔을 외면하지 마라. 그 감정마저도 너의 소중한 일부다.", author: "인사이드 아웃" },
                { text: "많이 지쳤다는 건 그만큼 네가 매 순간 진심이었다는 증거다.", author: "감성 에세이" },
                { text: "괜찮아, 울어도 돼. 밤이 지나면 어김없이 아침은 오니까.", author: "카리나 (에스파)" },
                { text: "어두운 밤일수록 별은 더 밝게 빛나는 법이다.", author: "하늘 철학" },
                { text: "마음껏 슬퍼하고, 툴툴 털고, 더 멋지게 일어나면 된다.", author: "갓생 지침서" },
                { text: "지금 당장 답을 찾으려고 하지 마라. 삶은 흘러가며 답을 준다.", author: "인생 멘토" },
                { text: "슬플 땐 슬픈 플리에 온몸을 맡기고 실컷 감상하는 것도 방법이다.", author: "음악 치료사" },
                { text: "네 눈물이 가치 없는 곳에 낭비되지 않기를 바란다.", author: "자존감 전문가" },
                { text: "아픔을 아는 사람만이 타인의 아픔을 진심으로 안아줄 수 있다.", author: "현자 지침서" },
                { text: "오늘 밤은 푹 자고 일어나자. 내일은 오늘보다 조금 더 가벼울 거야.", author: "수면 요정" }
            ],
            "실연": [
                { text: "나를 사랑하지 않는 사람을 사랑하는 것만큼 비참한 일은 없다. 과감히 버려라.", author: "김숙" },
                { text: "사랑은 타이밍이고, 이별은 그냥 인연이 거기까지였던 거다. 집착하지 마라.", author: "서장훈" },
                { text: "최고의 복수는 내가 더 멋지고 잘 사는 모습을 보여주는 것이다.", author: "한혜진" },
                { text: "전 애인 카톡 프로필 볼 시간에 주식 창이나 한 번 더 봐라.", author: "금융치료사" },
                { text: "떠난 사람 붙잡지 마라. 버스는 놓치면 다음 차가 온다.", author: "정류장 철학가" },
                { text: "그 사람 없으면 죽을 것 같지? 두 달 뒤면 이름도 가물가물하다.", author: "기억조작단" },
                { text: "연애는 인생의 옵션이지 필수 과목이 아니다.", author: "솔로 예찬" },
                { text: "나를 아끼지 않는 사람에게 내 감정을 낭비하지 말자.", author: "감성 가성비론자" },
                { text: "더 좋은 사람 만나려고 액땜했다고 생각해라.", author: "운명론자" },
                { text: "혼자여서 좋은 점: 메뉴 내 마음대로 고름, 연락 안 봐도 됨.", author: "자유인" },
                { text: "이별을 겪었다는 건, 내가 더 성숙한 사랑을 할 준비가 되었다는 뜻이다.", author: "연애 심리학" },
                { text: "너를 울리는 사람은 너의 반쪽이 아니다.", author: "현실 조언" },

        // 기분 버튼을 누를 때 실행되는 함수
        function selectMood(mood, event) {
            currentMood = mood;
            
            const buttons = document.querySelectorAll('.mood-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            const targetBtn = event.target.closest('.mood-btn');
            if (targetBtn) targetBtn.classList.add('active');
            
            // 💡 다른 기분을 선택하면 무조건 상자 대기 상태로 되돌립니다.
            resetGiftBox();
        }

        // 선물 상자를 초기화하는 함수
        function resetGiftBox() {
            isOpened = false;
            document.getElementById('gift-box').style.display = 'flex';
            document.getElementById('quote-box').style.display = 'none';
            document.getElementById('guide-tip').innerText = "상자를 누르면 오늘의 명언 선물이 열립니다 🎁";
        }

        // 상자를 터치했을 때 열리면서 명언을 보여주는 함수
        function openGift() {
            const giftBox = document.getElementById('gift-box');
            const quoteBox = document.getElementById('quote-box');
            const quotes = quoteDatabase[currentMood];
            
            // 상자가 안 열려있을 때만 랜덤 명언 세팅
            if (!isOpened) {
                const randomIndex = Math.floor(Math.random() * quotes.length);
                document.getElementById('quote').innerText = `"${quotes[randomIndex].text}"`;
                document.getElementById('author').innerText = `- ${quotes[randomIndex].author} -`;
                isOpened = true;
            } else {
                // 이미 열려있는 상태에서 박스를 또 터치하면 다음 명언으로 넘어가게 연출
                const randomIndex = Math.floor(Math.random() * quotes.length);
                document.getElementById('quote').innerText = `"${quotes[randomIndex].text}"`;
                document.getElementById('author').innerText = `- ${quotes[randomIndex].author} -`;
            }

            // 화면 전환 연출
            giftBox.style.display = 'none';
            quoteBox.style.display = 'block';
            document.getElementById('guide-tip').innerText = "박스를 계속 터치하면 다른 처방이 나와요 ✨";

            // 애니메이션 껐다 켜기 (슥- 나타나는 프리미엄 페이드인 적용)
            quoteBox.classList.remove('fade-in');
            void quoteBox.offsetWidth; 
            quoteBox.classList.add('fade-in');
        }

        // 앱 시작 시 대기 상태로 세팅
        window.onload = function() {
            resetGiftBox();
